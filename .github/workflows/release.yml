name: Release

on:
  push:
    # vX.Y.Z → real PyPI + GitHub Release.
    # vX.Y.Z-rcN (or anything containing "-") → TestPyPI only.
    tags: ["v*"]

permissions:
  contents: write
  id-token: write   # for PyPI Trusted Publishing

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  publish-testpypi:
    if: contains(github.ref_name, '-')
    needs: build
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  publish-pypi:
    if: ${{ !contains(github.ref_name, '-') }}
    needs: build
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  github-release:
    if: ${{ !contains(github.ref_name, '-') }}
    needs: publish-pypi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Pick release notes (per-version file if present, else auto-generate)
        id: notes
        run: |
          NOTES=".github/RELEASE_NOTES_${{ github.ref_name }}.md"
          if [[ -f "$NOTES" ]]; then
            echo "body_path=$NOTES" >> "$GITHUB_OUTPUT"
            echo "generate=false"   >> "$GITHUB_OUTPUT"
          else
            echo "body_path="       >> "$GITHUB_OUTPUT"
            echo "generate=true"    >> "$GITHUB_OUTPUT"
          fi
      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          body_path: ${{ steps.notes.outputs.body_path }}
          generate_release_notes: ${{ steps.notes.outputs.generate == 'true' }}
          files: dist/*
